# Build FortDefendAgent.exe (pkg) and sign with Windows signtool + Certum PFX.
# Repository secrets: CERTUM_CERT_BASE64 (Base64 .pfx), CERTUM_CERT_PASSWORD
name: Build & sign Windows agent

on:
  push:
    paths:
      - 'agent/**'
      - '.github/workflows/build-sign-agent.yml'
  workflow_dispatch: {}

concurrency:
  group: build-sign-agent-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: powershell
    working-directory: agent

jobs:
  build-sign:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build EXE (pkg)
        run: npm run build

      - name: Sign EXE (signtool + Certum PFX)
        env:
          CODE_SIGN_PFX: ${{ secrets.CERTUM_CERT_BASE64 }}
          CODE_SIGN_PFX_PASSWORD: ${{ secrets.CERTUM_CERT_PASSWORD }}
        run: .\\sign.ps1 -ExePath dist\\FortDefendAgent.exe -SkipIfNoCert

      - name: Reminder if unsigned
        if: ${{ secrets.CERTUM_CERT_BASE64 == '' }}
        run: Write-Warning "CERTUM_CERT_BASE64 is not set; EXE was built but not signed."

      - name: Upload FortDefendAgent.exe
        uses: actions/upload-artifact@v4
        with:
          name: FortDefendAgent
          path: agent/dist/FortDefendAgent.exe
          if-no-files-found: error
