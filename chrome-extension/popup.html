<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { width: 320px; font-family: system-ui, sans-serif; margin: 0; background: #fff; color: #1d1d1f; }
  .header { background: #185FA5; color: white; padding: 16px; display: flex; align-items: center; gap: 10px; }
  .header h1 { font-size: 16px; font-weight: 600; margin: 0; }
  .score-section { padding: 20px; text-align: center; border-bottom: 1px solid #e5e5e3; }
  .score { font-size: 48px; font-weight: 700; line-height: 1; }
  .score.green { color: #3B6D11; }
  .score.amber { color: #854F0B; }
  .score.red { color: #A32D2D; }
  .score-label { font-size: 13px; color: #6e6e73; margin-top: 4px; }
  .checks { padding: 12px 16px; }
  .check { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f5f5f7; font-size: 13px; }
  .check:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.pass { background: #3B6D11; }
  .dot.warn { background: #854F0B; }
  .dot.fail { background: #A32D2D; }
  .check-name { flex: 1; color: #1d1d1f; }
  .check-detail { font-size: 11px; color: #6e6e73; }
  .footer { padding: 12px 16px; display: flex; gap: 8px; }
  button { flex: 1; padding: 8px; border: 1px solid #d2d2d7; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; }
  button.primary { background: #185FA5; color: white; border-color: #185FA5; }
  .not-enrolled { padding: 20px; text-align: center; }
  .not-enrolled p { font-size: 13px; color: #6e6e73; margin-bottom: 12px; }
  input { width: 100%; padding: 8px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 13px; box-sizing: border-box; margin-bottom: 8px; }
  .last-check { font-size: 11px; color: #6e6e73; text-align: center; padding: 4px 16px 8px; }
</style>
</head>
<body>
<div class="header">
  <div>🛡️</div>
  <h1>FortDefend Security</h1>
</div>
<div id="content">
  <div style="padding:20px;text-align:center;color:#6e6e73;font-size:13px">Loading...</div>
</div>
<script src="popup.js"></script>
</body>
</html>
